---
name: CI
"on":
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  build:
    name: format, vet, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true

      - name: gofmt
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"
            echo "$unformatted"
            exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      # -short skips the network capability suite, which hits public resolvers
      # and is meant for local/manual runs; the unit tests still run here.
      - name: test
        run: go test -short ./...
